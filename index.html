<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Movie Ratings - Discover & Rate Films</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <meta name="description" content="Movie Ratings is redefining how the world experiences film. Discover, rate, and discuss movies with a global community of fans." />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        #modalBackdrop {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.6);
          z-index: 9998;
          backdrop-filter: blur(4px);
        }
        :root{
          --bg: #0b1220; --card:#0f1724; --muted:#9aa7b2; --accent:#06b6d4; --accent-2:#8b5cf6;
          --glass: rgba(255,255,255,0.03); --radius:14px;
          --success: #00c48c; --danger:#ff6b6b;
          color-scheme: dark;
        }
        *{box-sizing:border-box}
        html,body {
          height:100%;
          margin:0;
          font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
          color:#e6eef6;
          background: radial-gradient(1200px 600px at 10% 10%, rgba(8,20,34,0.6), transparent), linear-gradient(180deg, #071026 0%, #06121a 60%);
          background-attachment: fixed;
          background-repeat: no-repeat;
          background-size: cover;
          background-position: bottom center;
        }
        .wrap{max-width:1100px;margin:28px auto;padding:20px;display:flex;flex-direction:column}
        header{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .brand{display:flex;gap:12px;align-items:center}
        .logo {
          width: 48px;
          height: 48px;
          border-radius: 12px;
          object-fit: contain;
          box-shadow: none;
          background: none;
        }
        h1{margin:0;font-size:18px}
        .top-actions{display:flex;gap:8px;align-items:center}
        button{cursor:pointer;border-radius:10px;border:none;padding:8px 12px;background:var(--accent);color:#042027;font-weight:700}
        button.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}
        .card{background:linear-gradient(180deg,var(--card), rgba(255,255,255,0.02));border-radius:var(--radius);padding:16px;box-shadow:0 8px 24px rgba(2,6,23,0.65);border:1px solid rgba(255,255,255,0.03)}
        .expanded-panel {
          background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
          border: 1px solid rgba(255,255,255,0.05);
          border-radius: var(--radius);
          padding: 18px 20px;
          margin-top: 10px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .expanded-stats {
          display: flex;
          flex-direction: column;
          gap: 10px;
          padding: 10px 0;
          border-top: 1px solid rgba(255,255,255,0.05);
          border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .expanded-stats .summary {
          display: flex;
          align-items: center;
          gap: 12px;
          flex-wrap: wrap;
        }
        .expanded-stats .expanded-breakdown {
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
        }
        .expanded-form {
          display: flex;
          flex-direction: column;
          gap: 10px;
          background: rgba(255,255,255,0.02);
          border-radius: 10px;
          padding: 12px;
          border: 1px solid rgba(255,255,255,0.04);
        }
        .expanded-form .stars-container {
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
        }
        .expanded-form textarea {
          margin-top: 6px;
        }
        .expanded-list {
          display: flex;
          flex-direction: column;
          gap: 8px;
          padding-top: 10px;
        }
        .expanded-list .rating-item {
          background: rgba(255,255,255,0.02);
          border-radius: 8px;
          padding: 10px;
          display: flex;
          gap: 10px;
          align-items: flex-start;
        }
        .expanded-list .rating-item .avatar {
          flex-shrink: 0;
          width: 40px;
          height: 40px;
          border-radius: 8px;
          background: linear-gradient(135deg,#111827,#0b1220);
          display: grid;
          place-items: center;
          font-weight: 700;
          color: var(--muted);
        }
        .main-content{flex:1;display:grid;grid-template-columns:1fr}
        .controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
        .search-bar {
          width: 100%;
          display: flex;
          flex-direction: column;
          margin-bottom: 14px;
        }
        .search-label {
          font-weight: 700;
          font-size: 14px;
          color: var(--accent);
          margin-bottom: 6px;
          letter-spacing: 0.3px;
          text-transform: uppercase;
        }
        .search-bar input[type="search"] {
          width: 100%;
          font-size: 15px;
          padding: 12px;
          border-radius: 12px;
          background: rgba(255,255,255,0.04);
          border: 1px solid rgba(255,255,255,0.1);
        }
        input[type="text"], input[type="search"], select, textarea{background:var(--glass);border:1px solid rgba(255,255,255,0.04);color:inherit;padding:10px;border-radius:10px;outline:none}
        textarea{min-height:84px;resize:vertical}
        .movie-list{display:grid;gap:12px;margin-top:10px}
        .movie-row{display:flex;gap:12px;align-items:center;padding:12px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);cursor:pointer}
        .poster{width:72px;height:104px;border-radius:8px;background:linear-gradient(180deg,#071026,#0b1220);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--muted);font-size:20px}
        .poster-img {
          width: 72px;
          height: 104px;
          object-fit: cover;
          border-radius: 8px;
          flex-shrink: 0;
          box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .meta{flex:1;display:flex;flex-direction:column}
        .title-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
        .movie-title{font-size:16px;margin:0}
        .small{font-size:13px;color:var(--muted)}
        .avg{font-weight:800;font-size:18px}
        .stars{display:flex;gap:6px;align-items:center}
        .star{width:26px;height:26px;display:inline-grid;place-items:center;border-radius:6px;cursor:pointer;user-select:none}
        .star.on{background:linear-gradient(180deg,var(--accent),#07a3b5);color:#012}
        .avatar{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,#111827,#0b1220);display:inline-grid;place-items:center;font-weight:800;color:var(--muted)}
        footer{text-align:center;margin-top:32px;padding-top:16px;color:var(--muted);font-size:13px;border-top:1px solid rgba(255,255,255,0.05)}
        .badge{background:rgba(255,255,255,0.06);padding:4px 8px;border-radius:999px;font-weight:700;font-size:12px;color:#d9f7ff}
        .pagination{display:flex;gap:8px;justify-content:center;align-items:center;margin:24px 0}
        .pagination button,.pagination span{padding:8px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer}
        .pagination button.active,.pagination button:hover{background:var(--accent);color:#041820;font-weight:700}
        .pagination span{font-weight:700;color:var(--accent)}
        nav{display:flex;gap:12px;align-items:center}
        nav a{color:var(--muted);text-decoration:none;cursor:pointer;font-size:14px;padding:6px 12px;border-radius:8px;transition:all 0.2s}
        nav a.active{color:var(--accent);font-weight:700}
        nav a:hover{background:rgba(255,255,255,0.05)}
        #editNameModal .card { box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
        #editNameModal input { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); color: inherit; }
        #editNameMsg { color: var(--accent); }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2342721268649961" crossorigin="anonymous"></script>
</head>

<body>
    <div id="modalBackdrop"></div>
    <div class="wrap" id="app">
        <header>
            <div class="brand">
                <img src="images/Favicon.png" alt="Movie Ratings Logo" class="logo">
                <div>
                    <h1>Movie Ratings</h1>
                    <div class="small">Verified Movie Ratings</div>
                </div>
            </div>
            <nav id="nav"></nav>
            <div class="top-actions">
                <div id="signedOutControls">
                    <button id="signInBtn">Sign in with Google</button>
                </div>
                <div id="signedInControls" style="display:none;align-items:center;gap:8px">
                    <div class="small" id="userName">—</div>
                    <div id="verifiedBadge"></div>
                    <button id="editNameBtn" class="ghost" title="Change your display name">Edit name</button>
                    <div id="editNameModal" style="display:none;position:fixed;right:20px;top:84px;z-index:9999">
                        <div class="card" style="min-width:320px;padding:12px;">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <strong>Change display name</strong>
                                <button id="closeEditName" class="ghost" style="padding:6px 8px">×</button>
                            </div>
                            <div style="height:8px"></div>
                            <input id="editNameInput" type="text" placeholder="New display name" style="width:100%;padding:8px;border-radius:8px" />
                            <div style="height:8px"></div>
                            <div style="display:flex;gap:8px;justify-content:flex-end">
                                <button id="cancelEditName" class="ghost">Cancel</button>
                                <button id="saveEditName">Save</button>
                            </div>
                            <div id="editNameMsg" class="small" style="margin-top:8px;color:var(--muted);display:none"></div>
                        </div>
                    </div>
                    <button id="signOutBtn" class="ghost">Sign out</button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                    <strong>Browse Movies</strong>
                    <small class="small">Leave a review!</small>
                </div>
                <div class="controls" role="group" aria-label="movie controls">
                    <div class="search-bar">
                        <label for="searchInput" class="search-label">🎬 Movie Search</label>
                        <input type="search" id="searchInput" placeholder="Search movies by title..." />
                    </div>
                </div>
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
                    <div class="small">Sort:</div>
                    <select id="sortSelect">
                        <option value="avg">Highest rated</option>
                        <option value="recent">Most recent</option>
                        <option value="count">Most rated</option>
                        <option value="title">Title A–Z</option>
                    </select>
                    <div class="small">Show verified-only</div>
                    <input type="checkbox" id="verifiedOnly" />
                </div>
                <div class="movie-list" id="movieList" aria-live="polite"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>

        <footer>© 2025 Movie Ratings • All Rights Reserved</footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, onValue, child, get, update } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDPcQhADbFJzw54YLCMPKreZKKLmL1SRW8",
          authDomain: "the-movie-ratings.firebaseapp.com",
          databaseURL: "https://the-movie-ratings-default-rtdb.firebaseio.com",
          projectId: "the-movie-ratings",
          storageBucket: "the-movie-ratings.firebasestorage.app",
          messagingSenderId: "208532935279",
          appId: "1:208532935279:web:875fc444e712c75667b39a",
          measurementId: "G-6582T4SZKR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const nowISO = () => new Date().toISOString();
        const escapeHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        const refs = {
          signInBtn: document.getElementById('signInBtn'),
          signOutBtn: document.getElementById('signOutBtn'),
          signedInControls: document.getElementById('signedInControls'),
          signedOutControls: document.getElementById('signedOutControls'),
          userName: document.getElementById('userName'),
          verifiedBadge: document.getElementById('verifiedBadge'),
          search: document.getElementById('searchInput'),
          sort: document.getElementById('sortSelect'),
          verifiedOnly: document.getElementById('verifiedOnly'),
          movieList: document.getElementById('movieList'),
          pagination: document.getElementById('pagination'),
          editNameBtn: document.getElementById('editNameBtn'),
          editNameModal: document.getElementById('editNameModal'),
          editNameInput: document.getElementById('editNameInput'),
          saveEditName: document.getElementById('saveEditName'),
          cancelEditName: document.getElementById('cancelEditName'),
          closeEditName: document.getElementById('closeEditName'),
          editNameMsg: document.getElementById('editNameMsg'),
          nav: document.getElementById('nav'),
        };

        let currentUser = null;
        let currentVerified = {};
        let expandedFor = null;
        let expandedEl = null;
        let pendingRating = 5;
        let currentPage = 1;
        const itemsPerPage = 8;
        let allMovies = [];

        refs.signInBtn.addEventListener('click', async () => {
          try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); alert('Sign-in failed: ' + e.message); }
        });
        refs.signOutBtn.addEventListener('click', async ()=> { await signOut(auth); });

        onAuthStateChanged(auth, user => {
          currentUser = user;
          if (user) {
            refs.signedOutControls.style.display = 'none';
            refs.signedInControls.style.display = 'flex';
            refs.userName.textContent = user.displayName || user.email || user.uid;
            checkVerified(user).then(v => renderVerifiedBadge(v));
          } else {
            refs.signedOutControls.style.display = 'flex';
            refs.signedInControls.style.display = 'none';
            refs.userName.textContent = '—';
            renderVerifiedBadge(false);
          }
          updateNav();
        });

        function updateNav() {
          refs.nav.innerHTML = '';
          const homeLink = document.createElement('a');
          homeLink.href = 'index.html';
          homeLink.textContent = '🏠 Home';
          homeLink.classList.add('active');

          const leaderboardLink = document.createElement('a');
          leaderboardLink.href = 'leaderboard.html';
          leaderboardLink.textContent = '⭐ Leaderboard';

          refs.nav.appendChild(homeLink);
          refs.nav.appendChild(leaderboardLink);

          if (currentUser) {
            checkVerified(currentUser).then(verified => {
              if (verified) {
                const addMovieLink = document.createElement('a');
                addMovieLink.href = 'add-movie.html';
                addMovieLink.textContent = '➕ Add Movie';
                refs.nav.appendChild(addMovieLink);
              }
            });
          }
        }

        function showEditNameModal(prefill='') {
          refs.editNameInput.value = prefill;
          refs.editNameMsg.style.display = 'none';
          refs.editNameModal.style.display = 'block';
          refs.editNameInput.focus();
        }
        function hideEditNameModal() {
          refs.editNameModal.style.display = 'none';
          refs.editNameMsg.style.display = 'none';
          refs.editNameInput.value = '';
        }

        refs.editNameBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!currentUser) return alert('Sign in first to change your display name.');
          const current = currentUser.displayName || currentUser.email || '';
          showEditNameModal(current);
        });

        refs.cancelEditName.addEventListener('click', (e) => { e.stopPropagation(); hideEditNameModal(); });
        refs.closeEditName.addEventListener('click', (e) => { e.stopPropagation(); hideEditNameModal(); });

        refs.saveEditName.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          if (!currentUser) return alert('You must be signed in.');
          const newName = refs.editNameInput.value.trim();
          if (!newName) {
            refs.editNameMsg.textContent = 'Please enter a name.';
            refs.editNameMsg.style.display = '';
            return;
          }
          if (newName.length < 2 || newName.length > 40) {
            refs.editNameMsg.textContent = 'Name must be 2–40 characters.';
            refs.editNameMsg.style.display = '';
            return;
          }

          try {
            await updateProfile(auth.currentUser, { displayName: newName });
            await update(ref(db, `raterIndex/${currentUser.uid}`), { displayName: newName });

            const moviesSnap = await get(ref(db, 'movies'));
            const movies = moviesSnap.val() || {};
            const movieIds = Object.keys(movies);

            refs.editNameMsg.textContent = 'Saving — updating your existing ratings...';
            refs.editNameMsg.style.display = '';
            for (const mid of movieIds) {
              const rRef = ref(db, `ratings/${mid}`);
              const rSnap = await get(rRef);
              const ratings = rSnap.val() || {};
              for (const [k, r] of Object.entries(ratings)) {
                if (r && r.uid === currentUser.uid) {
                  await update(child(rRef, k), { displayName: newName });
                }
              }
            }

            refs.userName.textContent = newName;
            refs.editNameMsg.textContent = 'Saved successfully!';
            setTimeout(() => { hideEditNameModal(); }, 900);
          } catch (err) {
            console.error('Failed to update display name:', err);
            refs.editNameMsg.textContent = 'Error: ' + (err.message || err);
            refs.editNameMsg.style.display = '';
          }
        });

        function watchVerifiedList() {
          const vRef = ref(db, 'verifiedUsers');
          onValue(vRef, snapshot => {
            currentVerified = snapshot.val() || {};
            if (currentUser) checkVerified(currentUser).then(v => renderVerifiedBadge(v));
          });
        }
        watchVerifiedList();

        async function checkVerified(user) {
          if (!user) return false;
          const uidKey = user.uid;
          const safeEmailKey = (user.email || '').replace('.', '_dot_');
          if (currentVerified[uidKey]) return true;
          if (currentVerified[safeEmailKey]) return true;
          if (currentVerified[user.email]) return true;
          return false;
        }

        function renderVerifiedBadge(isVerified) {
          refs.verifiedBadge.innerHTML = isVerified ? '<div class="badge">✔ Verified</div>' : '';
        }

        function renderStars(container, onSelect, value=8) {
          container.innerHTML = '';
          for (let i=1;i<=10;i++){
            const s = document.createElement('div');
            s.className = 'star ' + (i <= value ? 'on' : '');
            s.tabIndex = 0;
            s.setAttribute('role','radio');
            s.setAttribute('aria-checked', i===value ? 'true' : 'false');
            s.title = i + '/10';
            s.textContent = '★';
            s.addEventListener('click', ()=>{ onSelect(i); renderStars(container,onSelect,i); });
            s.addEventListener('keydown', (e)=>{ if (e.key === 'Enter' || e.key === ' ') { onSelect(i); renderStars(container,onSelect,i); } });
            container.appendChild(s);
          }
        }

        function createExpandedDOM(movie) {
          const container = document.createElement('div');
          container.className = 'card expanded-panel';
          container.setAttribute('data-expanded-for', movie.id);

          container.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <strong class="expanded-title">${escapeHtml(movie.title)} ${movie.year ? ' ('+escapeHtml(movie.year)+')' : ''}</strong>
                <div class="small expanded-subtitle">Added ${new Date(movie.createdAt).toLocaleString()}</div>
              </div>
              <div style="text-align:right">
                <div class="small">Signed in as:</div>
                <div class="small expanded-signed-in">${escapeHtml(currentUser?.displayName || currentUser?.email || '—')}</div>
              </div>
            </div>
            <div style="height:12px"></div>
            <div class="expanded-stats small">
              <div class="summary">
                <div>
                  <div class="avg expanded-avg">—</div>
                  <div class="small">avg</div>
                </div>
                <div class="small expanded-count">— ratings</div>
                <div style="flex:1"></div>
                <button class="ghost expanded-leave-btn">Leave a Rating</button>
              </div>
              <div class="expanded-breakdown"></div>
            </div>
            <div style="height:12px"></div>
            <div class="expanded-form" style="display:none">
              <div style="display:flex;gap:8px;align-items:center">
                <div class="small">Your rating:</div>
                <div class="stars-container" role="radiogroup" aria-label="Rating stars"></div>
                <div style="flex:1"></div>
                <button class="ghost expanded-cancel-btn">Cancel</button>
                <button class="expanded-submit-btn">Submit Rating</button>
              </div>
              <textarea class="expanded-comment" placeholder="Optional comment (public)"></textarea>
            </div>
            <div style="height:12px"></div>
            <div class="expanded-list small" style="max-height:260px;overflow:auto;border-top:1px dashed rgba(255,255,255,0.03);padding-top:8px"></div>
          `;

          container.querySelector('.expanded-leave-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!currentUser) return alert('Please sign in to leave a rating.');
            container.querySelector('.expanded-form').style.display = 'flex';
            container.querySelector('.expanded-leave-btn').style.display = 'none';
            const starsContainer = container.querySelector('.stars-container');
            pendingRating = 5;
            renderStars(starsContainer, v => pendingRating = v, pendingRating);
          });

          container.querySelector('.expanded-cancel-btn').addEventListener('click', (ev) => {
            ev.stopPropagation();
            container.querySelector('.expanded-form').style.display = 'none';
            container.querySelector('.expanded-leave-btn').style.display = '';
          });

          container.querySelector('.expanded-submit-btn').addEventListener('click', async (ev) => {
            ev.stopPropagation();
            const movieId = container.getAttribute('data-expanded-for');
            if (!currentUser) return alert('Please sign in first.');
            if (!movieId) return alert('No movie selected.');
            if (!pendingRating || pendingRating < 1 || pendingRating > 10) return alert('Select a rating between 1–10.');
            const comment = container.querySelector('.expanded-comment').value.trim();
            const ratingsRef = ref(db, `ratings/${movieId}`);

            const snapshot = await get(ratingsRef);
            const ratings = snapshot.val() || {};
            const existingKey = Object.keys(ratings).find(k => ratings[k].uid === currentUser.uid);

            const verified = await checkVerified(currentUser);
            const ratingData = {
              uid: currentUser.uid,
              displayName: currentUser.displayName || currentUser.email || currentUser.uid,
              email: currentUser.email || '',
              score: pendingRating,
              comment,
              createdAt: nowISO(),
              verified
            };

            if (existingKey) {
              await update(child(ratingsRef, existingKey), ratingData);
              alert('Your previous rating has been updated!');
            } else {
              const ratingId = Math.random().toString(36).slice(2,9);
              await update(ratingsRef, { [ratingId]: ratingData });
              const rIndexRef = ref(db, `raterIndex/${currentUser.uid}`);
              const rIndexSnap = await get(rIndexRef);
              const oldCount = (rIndexSnap.val() && rIndexSnap.val().count) || 0;
              await update(rIndexRef, {
                displayName: currentUser.displayName || currentUser.email || currentUser.uid,
                email: currentUser.email || '',
                count: oldCount + 1
              });
              alert('Your rating has been submitted!');
            }

            container.querySelector('.expanded-form').style.display = 'none';
            container.querySelector('.expanded-leave-btn').style.display = '';
            container.querySelector('.expanded-comment').value = '';
          });

          return container;
        }

        async function updateExpandedPanel(movieId, ratingsVal) {
          if (!expandedEl || expandedFor !== movieId) return;
          const container = expandedEl;
          const ratings = ratingsVal || {};
          const values = Object.values(ratings).map(r => r.score || 0);
          const count = values.length;
          const avg = count ? Math.round((values.reduce((a,b)=>a+b,0)/count)*100)/100 : 0;

          container.querySelector('.expanded-avg').textContent = count ? avg : '—';
          container.querySelector('.expanded-count').textContent = (count) + ' ratings';

          let html = '<div style="display:flex;gap:8px;flex-wrap:wrap">';
          const breakdown = {};
          for (let i=1;i<=10;i++) breakdown[i] = 0;
          Object.values(ratings).forEach(r => breakdown[r.score] = (breakdown[r.score]||0)+1);
          for (let i=10;i>=1;i--) {
            const pct = count ? Math.round((breakdown[i]/count)*100) : 0;
            html += `<div class="badge" style="opacity:0.95">${i} • ${pct}%</div>`;
          }
          html += '</div>';
          container.querySelector('.expanded-breakdown').innerHTML = html;

          const listEl = container.querySelector('.expanded-list');
          if (!listEl) return;
          listEl.innerHTML = '';
          const entries = Object.values(ratings).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
          if (entries.length === 0) {
            listEl.innerHTML = '<div class="small">No ratings yet.</div>';
          } else {
            entries.forEach(r => {
              const e = document.createElement('div');
              e.className = 'rating-item';
              e.innerHTML = `
                <div class="avatar">${escapeHtml((r.displayName||r.email||r.uid).slice(0,2).toUpperCase())}</div>
                <div style="flex:1">
                  <div style="font-weight:700">${escapeHtml(r.displayName || r.email || r.uid)} <span class="small">• ${new Date(r.createdAt).toLocaleString()}</span></div>
                  <div class="small">Score: ${r.score}/10 ${r.verified ? '<span class="badge">✔</span>' : ''}</div>
                  ${r.comment ? `<div style="margin-top:6px">${escapeHtml(r.comment)}</div>` : ''}
                </div>
              `;
              listEl.appendChild(e);
            });
          }
        }

        function closeExpandedPanel() {
          if (!expandedEl) return;
          expandedEl.remove();
          expandedEl = null;
          expandedFor = null;
        }

        async function renderMovieList() {
          const q = refs.search.value.trim().toLowerCase();
          const onlyVerified = refs.verifiedOnly.checked;
          const sort = refs.sort.value;

          let mSnap = await get(ref(db, 'movies'));
          let arr = Object.values(mSnap.val() || {});

          if (q) arr = arr.filter(m => (m.title + ' ' + (m.year||'')).toLowerCase().includes(q));

          const withStats = await Promise.all(arr.map(async m => {
            const ratingsSnap = await get(ref(db, `ratings/${m.id}`));
            const ratings = ratingsSnap.val() || {};
            const vals = Object.values(ratings).map(r=>r.score || 0);
            const count = vals.length;
            const avg = count ? Math.round((vals.reduce((a,b)=>a+b,0)/count)*100)/100 : 0;
            const breakdown = {};
            for (let i=1;i<=10;i++) breakdown[i] = 0;
            Object.values(ratings).forEach(r => { breakdown[r.score] = (breakdown[r.score]||0)+1; });
            const hasVerified = Object.values(ratings).some(r => r.verified);
            return {...m, stats:{avg,count,breakdown,hasVerified}};
          }));

          let final = withStats;
          if (onlyVerified) final = final.filter(m => m.stats.hasVerified);

          final.sort((a,b) => {
            if (sort === 'recent') return new Date(b.createdAt) - new Date(a.createdAt);
            if (sort === 'avg') return (b.stats.avg||0) - (a.stats.avg||0);
            if (sort === 'count') return (b.stats.count||0) - (a.stats.count||0);
            if (sort === 'title') return a.title.localeCompare(b.title);
            return 0;
          });

          allMovies = final;
          currentPage = 1;
          renderPage();
        }

        function renderPage() {
          refs.movieList.innerHTML = '';
          if (allMovies.length === 0) {
            refs.movieList.innerHTML = '<div class="small" style="padding:12px">No movies yet. Come back later!</div>';
            refs.pagination.innerHTML = '';
            return;
          }

          const totalPages = Math.ceil(allMovies.length / itemsPerPage);
          const start = (currentPage - 1) * itemsPerPage;
          const end = start + itemsPerPage;
          const pageMovies = allMovies.slice(start, end);

          pageMovies.forEach(m => {
            const row = document.createElement('div');
            row.className = 'movie-row card';
            row.setAttribute('data-movie-id', m.id);
            const posterHtml = m.poster 
              ? `<img src="${escapeHtml(m.poster)}" alt="Poster for ${escapeHtml(m.title)}" class="poster-img" />`
              : `<div class="poster" aria-hidden="true">${escapeHtml(m.title.split(' ').map(s=>s[0]).slice(0,2).join(''))}</div>`;

            row.innerHTML = `
              ${posterHtml}
              <div class="meta">
                <div class="title-row">
                  <div style="min-width:0">
                    <div class="movie-title">${escapeHtml(m.title)} ${m.year?'<span class="small">('+escapeHtml(m.year)+')</span>':''}</div>
                    <div class="small">Added ${new Date(m.createdAt).toLocaleString()}</div>
                  </div>
                  <div style="text-align:right">
                    <div class="avg">${m.stats.count ? m.stats.avg : '—'}</div>
                    <div class="small">${m.stats.count} rating${m.stats.count !== 1 ? 's' : ''}</div>
                  </div>
                </div>
              </div>
            `;

            row.addEventListener('click', async () => {
              if (expandedFor === m.id) { closeExpandedPanel(); return; }
              closeExpandedPanel();
              const panel = createExpandedDOM(m);
              row.parentNode.insertBefore(panel, row.nextSibling);
              expandedFor = m.id;
              expandedEl = panel;

              const snap = await get(ref(db, `ratings/${m.id}`));
              updateExpandedPanel(m.id, snap.val());

              const ratingsRef = ref(db, `ratings/${m.id}`);
              onValue(ratingsRef, (snapshot) => {
                if (expandedFor === m.id) updateExpandedPanel(m.id, snapshot.val());
              });
            });

            refs.movieList.appendChild(row);
          });

          // Render pagination
          refs.pagination.innerHTML = '';
          if (totalPages <= 1) return;

          if (currentPage > 1) {
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '← Previous';
            prevBtn.addEventListener('click', () => { currentPage--; renderPage(); });
            refs.pagination.appendChild(prevBtn);
          }

          for (let i = 1; i <= totalPages; i++) {
            if (i === currentPage) {
              const span = document.createElement('span');
              span.textContent = i;
              refs.pagination.appendChild(span);
            } else {
              const btn = document.createElement('button');
              btn.textContent = i;
              if (i === currentPage) btn.classList.add('active');
              btn.addEventListener('click', () => { currentPage = i; renderPage(); });
              refs.pagination.appendChild(btn);
            }
          }

          if (currentPage < totalPages) {
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next →';
            nextBtn.addEventListener('click', () => { currentPage++; renderPage(); });
            refs.pagination.appendChild(nextBtn);
          }
        }

        refs.search.addEventListener('input', renderMovieList);
        refs.sort.addEventListener('change', renderMovieList);
        refs.verifiedOnly.addEventListener('change', renderMovieList);

        const mRef = ref(db, 'movies');
        onValue(mRef, renderMovieList);

        updateNav();
    </script>
</body>

</html>
